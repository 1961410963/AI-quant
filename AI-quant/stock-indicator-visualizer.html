<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票技术指标可视化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
        .header-controls { display: flex; align-items: center; gap: 12px; }
        .header-controls label { font-size: 13px; color: rgba(255,255,255,0.9); }
        .header-controls select,
        .header-controls input[type="date"] {
            padding: 4px 8px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px; font-size: 13px; background: rgba(255,255,255,0.15);
            color: #fff; outline: none;
        }
        .header-controls select option { color: #333; background: #fff; }
        .main-wrap { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px; min-width: 280px; background: #fff;
            border-right: 1px solid #e0e0e0; overflow-y: auto; flex-shrink: 0;
            padding-bottom: 60px;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
        .group-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; cursor: pointer; background: #f0f1f5;
            border-bottom: 1px solid #e8e8e8; user-select: none;
            font-size: 13px; font-weight: 600; color: #444;
        }
        .group-header:hover { background: #e8e9f0; }
        .group-header .arrow { transition: transform 0.2s; font-size: 11px; }
        .group-header.collapsed .arrow { transform: rotate(-90deg); }
        .group-body { padding: 10px 14px; border-bottom: 1px solid #eee; }
        .group-body.hidden { display: none; }
        .param-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 6px; font-size: 12px; color: #555;
        }
        .param-row:last-child { margin-bottom: 0; }
        .param-row input[type="number"] {
            width: 60px; padding: 3px 6px; border: 1px solid #ddd;
            border-radius: 3px; font-size: 12px; text-align: center;
        }
        .param-row input[type="checkbox"] { margin-right: 4px; }
        .param-row select {
            padding: 2px 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 12px;
        }
        .btn-recalc {
            display: block; width: calc(100% - 28px); margin: 14px 14px 0;
            padding: 10px 0; background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 6px; font-size: 14px;
            font-weight: 600; cursor: pointer; letter-spacing: 1px;
        }
        .btn-recalc:hover { opacity: 0.9; }
        .chart-area { flex: 1; overflow-y: auto; padding: 8px; background: #f5f6fa; }
        .chart-area::-webkit-scrollbar { width: 6px; }
        .chart-area::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
        .chart-box {
            background: #fff; border-radius: 8px; margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden;
        }
        .chart-box .chart-title {
            padding: 8px 14px; font-size: 13px; font-weight: 600;
            color: #555; border-bottom: 1px solid #f0f0f0; background: #fafafa;
        }
        .chart-container { width: 100%; height: 320px; }
        .chart-container.tall { height: 400px; }
        .no-data {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: #999; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>股票技术指标可视化工具</h1>
    <div class="header-controls">
        <label>股票：</label>
        <select id="stockSelect">
            <optgroup label="股票">
                <option value="600967.SH">内蒙一机(600967.SH)</option>
                <option value="600346.SH">恒力石化(600346.SH)</option>
                <option value="002080.SZ">中材科技(002080.SZ)</option>
                <option value="002812.SZ">恩捷股份(002812.SZ)</option>
                <option value="601899.SH">紫金矿业(601899.SH)</option>
            </optgroup>
            <optgroup label="ETF基金">
                <option value="159562.SZ">华夏黄金ETF(159562.SZ)</option>
                <option value="563020.SH">易方达红利低波ETF(563020.SH)</option>
            </optgroup>
        </select>
        <label>起始：</label>
        <input type="date" id="startDate">
        <label>截止：</label>
        <input type="date" id="endDate">
    </div>
</div>

<div class="main-wrap">
    <div class="sidebar">
        <div class="group-header" onclick="toggleGroup(this)">
            <span>均线系统 (MA)</span><span class="arrow">▼</span>
        </div>
        <div class="group-body">
            <div class="param-row"><label><input type="checkbox" id="ma5On" checked> MA5</label><input type="number" id="ma5N" value="5" min="2" max="120"></div>
            <div class="param-row"><label><input type="checkbox" id="ma10On" checked> MA10</label><input type="number" id="ma10N" value="10" min="2" max="120"></div>
            <div class="param-row"><label><input type="checkbox" id="ma20On" checked> MA20</label><input type="number" id="ma20N" value="20" min="2" max="120"></div>
            <div class="param-row"><label><input type="checkbox" id="ma60On"> MA60</label><input type="number" id="ma60N" value="60" min="2" max="120"></div>
        </div>

        <div class="group-header" onclick="toggleGroup(this)">
            <span>MACD</span><span class="arrow">▼</span>
        </div>
        <div class="group-body">
            <div class="param-row"><span>快线周期</span><input type="number" id="macdFast" value="12" min="2" max="100"></div>
            <div class="param-row"><span>慢线周期</span><input type="number" id="macdSlow" value="26" min="2" max="100"></div>
            <div class="param-row"><span>信号线周期</span><input type="number" id="macdSignal" value="9" min="2" max="100"></div>
            <div class="param-row"><label><input type="checkbox" id="macdMultiply2"> MACD柱×2</label></div>
        </div>

        <div class="group-header" onclick="toggleGroup(this)">
            <span>RSI</span><span class="arrow">▼</span>
        </div>
        <div class="group-body">
            <div class="param-row"><span>周期</span><input type="number" id="rsiPeriod" value="14" min="2" max="100"></div>
            <div class="param-row"><span>超买线</span><input type="number" id="rsiOverbought" value="70" min="50" max="100"></div>
            <div class="param-row"><span>超卖线</span><input type="number" id="rsiOversold" value="30" min="0" max="50"></div>
        </div>

        <div class="group-header" onclick="toggleGroup(this)">
            <span>KDJ</span><span class="arrow">▼</span>
        </div>
        <div class="group-body">
            <div class="param-row"><span>RSV周期</span><input type="number" id="kdjRsvN" value="9" min="2" max="100"></div>
            <div class="param-row"><span>K平滑</span><input type="number" id="kdjKSmooth" value="3" min="1" max="50"></div>
            <div class="param-row"><span>D平滑</span><input type="number" id="kdjDSmooth" value="3" min="1" max="50"></div>
        </div>

        <div class="group-header" onclick="toggleGroup(this)">
            <span>布林带</span><span class="arrow">▼</span>
        </div>
        <div class="group-body">
            <div class="param-row"><span>周期</span><input type="number" id="bollPeriod" value="20" min="2" max="120"></div>
            <div class="param-row"><span>标准差倍数</span><input type="number" id="bollMult" value="2" min="0.5" max="5" step="0.1"></div>
            <div class="param-row"><span>标准差类型</span>
                <select id="bollDdof">
                    <option value="0">总体标准差</option>
                    <option value="1">样本标准差</option>
                </select>
            </div>
        </div>

        <div class="group-header" onclick="toggleGroup(this)">
            <span>ATR</span><span class="arrow">▼</span>
        </div>
        <div class="group-body">
            <div class="param-row"><span>周期</span><input type="number" id="atrPeriod" value="14" min="2" max="100"></div>
        </div>

        <button class="btn-recalc" onclick="recalculate()">重新计算</button>
    </div>

    <div class="chart-area">
        <div class="chart-box">
            <div class="chart-title">K线图 + 均线</div>
            <div class="chart-container tall" id="chartKline"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">成交量</div>
            <div class="chart-container" id="chartVol"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">MACD</div>
            <div class="chart-container" id="chartMACD"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">RSI</div>
            <div class="chart-container" id="chartRSI"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">KDJ</div>
            <div class="chart-container" id="chartKDJ"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">布林带</div>
            <div class="chart-container" id="chartBOLL"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">ATR</div>
            <div class="chart-container" id="chartATR"></div>
        </div>
    </div>
</div>

        if (data[i] === null || data[i] === undefined) { result.push(null); continue; }
        if (i === 0 || result[i - 1] === null) { result.push(data[i]); continue; }
        result.push(data[i] * multiplier + result[i - 1] * (1 - multiplier));
    }
    return result;
}

function calcMACD(closes, fast, slow, signal, multiply2) {
    const emaFast = calcEMA(closes, fast);
    const emaSlow = calcEMA(closes, slow);
    const dif = closes.map((_, i) => {
        if (emaFast[i] === null || emaSlow[i] === null) return null;
        return emaFast[i] - emaSlow[i];
    });
    const dea = calcEMA(dif, signal);
    const macdBar = dif.map((v, i) => {
        if (v === null || dea[i] === null) return null;
        const val = multiply2 ? (v - dea[i]) * 2 : (v - dea[i]);
        return val;
    });
    return { dif, dea, macdBar };
}

function calcRSI(closes, n) {
    const result = [];
    let avgGain = null, avgLoss = null;
    for (let i = 0; i < closes.length; i++) {
        if (i === 0) { result.push(null); continue; }
        const delta = closes[i] - closes[i - 1];
        const gain = delta > 0 ? delta : 0;
        const loss = delta < 0 ? -delta : 0;
        if (avgGain === null) {
            avgGain = gain;
            avgLoss = loss;
        } else {
            avgGain = avgGain * (1 - 1 / n) + gain * (1 / n);
            avgLoss = avgLoss * (1 - 1 / n) + loss * (1 / n);
        }
        if (avgLoss === 0) {
            result.push(100);
        } else {
            result.push(100 - 100 / (1 + avgGain / avgLoss));
        }
    }
    return result;
}

function calcKDJ(data, rsvN, kSmooth, dSmooth) {
    const rsv = [];
    for (let i = 0; i < data.length; i++) {
        if (i < rsvN - 1) { rsv.push(null); continue; }
        let highN = -Infinity, lowN = Infinity;
        for (let j = i - rsvN + 1; j <= i; j++) {
            if (data[j].high > highN) highN = data[j].high;
            if (data[j].low < lowN) lowN = data[j].low;
        }
        const range = highN - lowN;
        rsv.push(range === 0 ? 50 : (data[i].close - lowN) / range * 100);
    }
    const kAlpha = 1 / kSmooth;
    const kLine = [];
    for (let i = 0; i < rsv.length; i++) {
        if (rsv[i] === null) { kLine.push(null); continue; }
        if (i === 0 || kLine[i - 1] === null) { kLine.push(50 * (1 - kAlpha) + rsv[i] * kAlpha); continue; }
        kLine.push(kLine[i - 1] * (1 - kAlpha) + rsv[i] * kAlpha);
    }
    const dAlpha = 1 / dSmooth;
    const dLine = [];
    for (let i = 0; i < kLine.length; i++) {
        if (kLine[i] === null) { dLine.push(null); continue; }
        if (i === 0 || dLine[i - 1] === null) { dLine.push(50 * (1 - dAlpha) + kLine[i] * dAlpha); continue; }
        dLine.push(dLine[i - 1] * (1 - dAlpha) + kLine[i] * dAlpha);
    }
    const jLine = kLine.map((v, i) => {
        if (v === null || dLine[i] === null) return null;
        return 3 * v - 2 * dLine[i];
    });
    return { k: kLine, d: dLine, j: jLine };
}

function calcBOLL(closes, period, mult, ddof) {
    const mid = calcMA(closes, period);
    const upper = [], lower = [];
    for (let i = 0; i < closes.length; i++) {
        if (mid[i] === null) { upper.push(null); lower.push(null); continue; }
        let sumSq = 0;
        for (let j = i - period + 1; j <= i; j++) {
            sumSq += (closes[j] - mid[i]) ** 2;
        }
        const std = Math.sqrt(sumSq / (period - ddof));
        upper.push(mid[i] + mult * std);
        lower.push(mid[i] - mult * std);
    }
    return { mid, upper, lower };
}

function calcATR(data, n) {
    const tr = [];
    for (let i = 0; i < data.length; i++) {
        if (i === 0) { tr.push(data[i].high - data[i].low); continue; }
        tr.push(Math.max(
            data[i].high - data[i].low,
            Math.abs(data[i].high - data[i - 1].close),
            Math.abs(data[i].low - data[i - 1].close)
        ));
    }
    const atr = [];
    for (let i = 0; i < tr.length; i++) {
        if (i === 0 || atr[i - 1] === null) { atr.push(tr[i]); continue; }
        atr.push(atr[i - 1] * (1 - 1 / n) + tr[i] * (1 / n));
    }
    return { tr, atr };
}

function toggleGroup(el) {
    el.classList.toggle('collapsed');
    const body = el.nextElementSibling;
    body.classList.toggle('hidden');
}

let charts = {};

function initCharts() {
    const ids = ['chartKline', 'chartVol', 'chartMACD', 'chartRSI', 'chartKDJ', 'chartBOLL', 'chartATR'];
    ids.forEach(id => {
        const dom = document.getElementById(id);
        if (dom) charts[id] = echarts.init(dom);
    });
}

function updateDateRange() {
    const stockCode = document.getElementById('stockSelect').value;
    const rawData = RAW_DATA[stockCode] || [];
    if (rawData.length > 0) {
        document.getElementById('startDate').value = rawData[0][0];
        document.getElementById('endDate').value = rawData[rawData.length - 1][0];
    }
}

function recalculate() {
    const stockCode = document.getElementById('stockSelect').value;
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const rawData = RAW_DATA[stockCode] || [];

    if (rawData.length === 0) {
        Object.values(charts).forEach(c => {
            if (c) c.setOption({
                title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#999', fontSize: 14 } },
                xAxis: { show: false }, yAxis: { show: false }, series: []
            });
        });
        return;
    }

    let data = parseRaw(rawData);
    data = filterByDate(data, startDate, endDate);

    const dates = data.map(d => d.date);
    const closes = data.map(d => d.close);

    const ma5On = document.getElementById('ma5On').checked;
    const ma10On = document.getElementById('ma10On').checked;
    const ma20On = document.getElementById('ma20On').checked;
    const ma60On = document.getElementById('ma60On').checked;
    const ma5N = parseInt(document.getElementById('ma5N').value) || 5;
    const ma10N = parseInt(document.getElementById('ma10N').value) || 10;
    const ma20N = parseInt(document.getElementById('ma20N').value) || 20;
    const ma60N = parseInt(document.getElementById('ma60N').value) || 60;

    const macdFast = parseInt(document.getElementById('macdFast').value) || 12;
    const macdSlow = parseInt(document.getElementById('macdSlow').value) || 26;
    const macdSignal = parseInt(document.getElementById('macdSignal').value) || 9;
    const macdMultiply2 = document.getElementById('macdMultiply2').checked;

    const rsiPeriod = parseInt(document.getElementById('rsiPeriod').value) || 14;
    const rsiOverbought = parseFloat(document.getElementById('rsiOverbought').value) || 70;
    const rsiOversold = parseFloat(document.getElementById('rsiOversold').value) || 30;

    const kdjRsvN = parseInt(document.getElementById('kdjRsvN').value) || 9;
    const kdjKSmooth = parseInt(document.getElementById('kdjKSmooth').value) || 3;
    const kdjDSmooth = parseInt(document.getElementById('kdjDSmooth').value) || 3;

    const bollPeriod = parseInt(document.getElementById('bollPeriod').value) || 20;
    const bollMult = parseFloat(document.getElementById('bollMult').value) || 2;
    const bollDdof = parseInt(document.getElementById('bollDdof').value);

    const atrPeriod = parseInt(document.getElementById('atrPeriod').value) || 14;

    const ma5 = ma5On ? calcMA(closes, ma5N) : null;
    const ma10 = ma10On ? calcMA(closes, ma10N) : null;
    const ma20 = ma20On ? calcMA(closes, ma20N) : null;
    const ma60 = ma60On ? calcMA(closes, ma60N) : null;
    const macd = calcMACD(closes, macdFast, macdSlow, macdSignal, macdMultiply2);
    const rsi = calcRSI(closes, rsiPeriod);
    const kdj = calcKDJ(data, kdjRsvN, kdjKSmooth, kdjDSmooth);
    const boll = calcBOLL(closes, bollPeriod, bollMult, bollDdof);
    const atr = calcATR(data, atrPeriod);

    const baseXAxis = { type: 'category', data: dates, boundaryGap: true, axisLabel: { fontSize: 10 }, axisLine: { lineStyle: { color: '#ccc' } } };
    const fmtVal = v => (v === null || v === undefined || isNaN(v)) ? '-' : Number(v).toFixed(2);

    // K线+均线
    const klineSeries = [{
        name: 'K线', type: 'candlestick',
        data: data.map(d => [d.open, d.close, d.low, d.high]),
        itemStyle: { color: '#ef4444', color0: '#22c55e', borderColor: '#ef4444', borderColor0: '#22c55e' }
    }];
    const maColors = ['#eab308', '#f97316', '#22c55e', '#8b5cf6'];
    const maNames = [`MA${ma5N}`, `MA${ma10N}`, `MA${ma20N}`, `MA${ma60N}`];
    const maData = [ma5, ma10, ma20, ma60];
    const maEnabled = [ma5On, ma10On, ma20On, ma60On];
    maEnabled.forEach((on, i) => {
        if (on && maData[i]) {
            klineSeries.push({
                name: maNames[i], type: 'line', data: maData[i],
                smooth: true, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: maColors[i] }, itemStyle: { color: maColors[i] }
            });
        }
    });

    charts.chartKline.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, valueFormatter: fmtVal },
        legend: { data: klineSeries.filter(s => s.type === 'line').map(s => s.name), top: 4, textStyle: { fontSize: 11 } },
        grid: { left: 60, right: 20, top: 30, bottom: 40 },
        xAxis: { ...baseXAxis },
        yAxis: { scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: fmtVal } },
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', bottom: 0, height: 20 }],
        series: klineSeries
    }, true);

    // 成交量
    charts.chartVol.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, valueFormatter: fmtVal },
        grid: { left: 60, right: 20, top: 20, bottom: 40 },
        xAxis: { ...baseXAxis },
        yAxis: { splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { fontSize: 10, formatter: fmtVal } },
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', bottom: 0, height: 20 }],
        series: [{
            name: '成交量', type: 'bar',
            data: data.map((d, i) => ({
                value: d.vol,
                itemStyle: { color: d.close >= d.open ? '#ef4444' : '#22c55e' }
            }))
        }]
    }, true);

    // MACD
    charts.chartMACD.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, valueFormatter: fmtVal },
        legend: { data: ['DIF', 'DEA', 'MACD'], top: 4, textStyle: { fontSize: 11 } },
        grid: { left: 60, right: 20, top: 30, bottom: 40 },
        xAxis: { ...baseXAxis },
        yAxis: { splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: fmtVal } },
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', bottom: 0, height: 20 }],
        series: [
            { name: 'DIF', type: 'line', data: macd.dif, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#eab308' }, itemStyle: { color: '#eab308' } },
            { name: 'DEA', type: 'line', data: macd.dea, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#3b82f6' }, itemStyle: { color: '#3b82f6' } },
            { name: 'MACD', type: 'bar', data: macd.macdBar.map(v => {
                if (v === null) return null;
                return { value: v, itemStyle: { color: v >= 0 ? '#ef4444' : '#22c55e' } };
            })}
        ]
    }, true);

    // RSI
    charts.chartRSI.setOption({
        tooltip: { trigger: 'axis', valueFormatter: fmtVal },
        legend: { data: [`RSI${rsiPeriod}`], top: 4, textStyle: { fontSize: 11 } },
        grid: { left: 60, right: 20, top: 30, bottom: 40 },
        xAxis: { ...baseXAxis },
        yAxis: { min: 0, max: 100, splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: fmtVal } },
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', bottom: 0, height: 20 }],
        series: [
            { name: `RSI${rsiPeriod}`, type: 'line', data: rsi, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#3b82f6' }, itemStyle: { color: '#3b82f6' } },
            { name: '超买', type: 'line', data: dates.map(() => rsiOverbought), symbol: 'none', lineStyle: { width: 1, type: 'dashed', color: '#ef4444' } },
            { name: '超卖', type: 'line', data: dates.map(() => rsiOversold), symbol: 'none', lineStyle: { width: 1, type: 'dashed', color: '#22c55e' } }
        ]
    }, true);

    // KDJ
    charts.chartKDJ.setOption({
        tooltip: { trigger: 'axis', valueFormatter: fmtVal },
        legend: { data: ['K', 'D', 'J'], top: 4, textStyle: { fontSize: 11 } },
        grid: { left: 60, right: 20, top: 30, bottom: 40 },
        xAxis: { ...baseXAxis },
        yAxis: { splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: fmtVal } },
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', bottom: 0, height: 20 }],
        series: [
            { name: 'K', type: 'line', data: kdj.k, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#eab308' }, itemStyle: { color: '#eab308' } },
            { name: 'D', type: 'line', data: kdj.d, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#3b82f6' }, itemStyle: { color: '#3b82f6' } },
            { name: 'J', type: 'line', data: kdj.j, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#ec4899' }, itemStyle: { color: '#ec4899' } },
            { name: '超买', type: 'line', data: dates.map(() => 80), symbol: 'none', lineStyle: { width: 1, type: 'dashed', color: '#c0c4cc' } },
            { name: '超卖', type: 'line', data: dates.map(() => 20), symbol: 'none', lineStyle: { width: 1, type: 'dashed', color: '#c0c4cc' } }
        ]
    }, true);

    // 布林带
    charts.chartBOLL.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, valueFormatter: fmtVal },
        legend: { data: ['收盘价', '上轨', '中轨', '下轨'], top: 4, textStyle: { fontSize: 11 } },
        grid: { left: 60, right: 20, top: 30, bottom: 40 },
        xAxis: { ...baseXAxis },
        yAxis: { scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: fmtVal } },
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', bottom: 0, height: 20 }],
        series: [
            { name: '收盘价', type: 'line', data: closes, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#3b82f6' }, itemStyle: { color: '#3b82f6' } },
            { name: '上轨', type: 'line', data: boll.upper, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#ef4444', type: 'dashed' }, itemStyle: { color: '#ef4444' } },
            { name: '中轨', type: 'line', data: boll.mid, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#f97316' }, itemStyle: { color: '#f97316' } },
            { name: '下轨', type: 'line', data: boll.lower, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#22c55e', type: 'dashed' }, itemStyle: { color: '#22c55e' } }
        ]
    }, true);

    // ATR
    charts.chartATR.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, valueFormatter: fmtVal },
        legend: { data: ['TR', 'ATR'], top: 4, textStyle: { fontSize: 11 } },
        grid: { left: 60, right: 20, top: 30, bottom: 40 },
        xAxis: { ...baseXAxis },
        yAxis: { splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: fmtVal } },
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', bottom: 0, height: 20 }],
        series: [
            { name: 'TR', type: 'bar', data: atr.tr, itemStyle: { color: 'rgba(156,163,175,0.5)' }, barWidth: '60%' },
            { name: 'ATR', type: 'line', data: atr.atr, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#8b5cf6' }, itemStyle: { color: '#8b5cf6' } }
        ]
    }, true);
}

window.addEventListener('load', () => {
    initCharts();
    updateDateRange();
    recalculate();

    window.addEventListener('resize', () => {
        Object.values(charts).forEach(c => { if (c) c.resize(); });
    });

    document.getElementById('stockSelect').addEventListener('change', () => {
        updateDateRange();
        recalculate();
    });

    document.getElementById('startDate').addEventListener('change', recalculate);
    document.getElementById('endDate').addEventListener('change', recalculate);
});
</script>
